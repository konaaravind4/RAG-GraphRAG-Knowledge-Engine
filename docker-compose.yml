version: "3.9"

services:
  neo4j:
    image: neo4j:5.19-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/password"
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: [ "CMD", "neo4j", "status" ]
      interval: 15s
      timeout: 10s
      retries: 5

  api:
    build: .
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - index_data:/app/data
    restart: unless-stopped

volumes:
  neo4j_data:
  index_data:
